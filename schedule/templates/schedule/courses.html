<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список курсов</title>
</head>
<body>
    <nav>
        <a href="{% url 'schedule_index' %}">Преподаватели</a> |
        <a href="{% url 'courses' %}">Курсы</a> |
        <a href="{% url 'student_index' %}">Студенты</a> |
    </nav>
    <hr>

    <h1>Список курсов</h1>
        
    <form method="get">
        <select name="teacher_id">
            <option value="">Все преподаватели</option>
            {% for teacher in teachers %}
                <option value="{{ teacher.id }}" {% if teacher.id|stringformat:"s" == selected_teacher %}selected{% endif %}>
                    {{ teacher.first_name }} {{ teacher.last_name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Фильтровать</button>
    </form>
    
    <ul>
        {% for course in courses %}
            <li><b>{{ course.title }}</b> - Автор курса: {{ course.teacher.first_name }} {{ course.teacher.last_name }}
                <br>
                Описание: {{ course.description }}
                <br>
            </li>
        {% empty %}
            <li>Курсы не найдены</li>
        {% endfor %}
    </ul>
    <a href="{% url 'create_course' %}">Создать новый курс</a>

</body>
</html>
