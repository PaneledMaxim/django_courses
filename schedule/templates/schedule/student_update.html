<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обновить информацию о студенте</title>
</head>
<body>
    <nav>
        <a href="{% url 'schedule_index' %}">Преподаватели</a> |
        <a href="{% url 'courses' %}">Курсы</a> |
        <a href="{% url 'student_index' %}">Студенты</a> |
    </nav>
    <hr>

    <h1>Обновить информацию о студенте</h1>
    <form method="post">
        {% csrf_token %}

        <label>
            Имя:
            <input type="text" name="first_name" value="{{ student.first_name }}" required>
        </label>
        <br><br>

        <label>
            Фамилия:
            <input type="text" name="last_name" value="{{ student.last_name }}" required>
        </label>
        <br><br>
            
        <label>
            Email:
            <input type="email" name="email" value="{{ student.email }}" required>
        </label>
        <br><br>
        
        <label>
            Дата рождения:
            <input type="date" name="birth_date" value="{{ student.birth_date|date:'Y-m-d' }}" required>
        </label>
        <br><br>

        <button type="submit">Обновить</button>
        <br><br>
    </form>
    
    <a href="{% url 'student_index' %}">Вернуться в список студентов</a>
    <br>
    <a href="{% url 'student_courses' student.id %}">К курсам студента</a>
</body>
</html>
