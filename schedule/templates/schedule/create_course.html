<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать курс</title>
</head>
<body>
    <nav>
        <a href="{% url 'schedule_index' %}">Преподаватели</a> |
        <a href="{% url 'courses' %}">Курсы</a> |
        <a href="{% url 'student_index' %}">Студенты</a> |
    </nav>
    <hr>

    <h1>Создать новый курс</h1>
    <form method="post">
        {% csrf_token %}
        <label>
            Название:
            <input type="text" name="title" required>
        </label>
        <br><br>

        <label>
            Описание:
            <textarea name="description"></textarea>
        </label>
        <br><br>

        <label>
            Преподаватель:
            <select name="teacher_id">
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}">{{ teacher.first_name }} {{ teacher.last_name }}</option>
                {% endfor %}
            </select>
        </label>
        <br><br>
        
        <button type="submit">Сохранить</button>
    </form>
    <br>
    <a href="{% url 'courses' %}">К списку курсов</a>
</body>
</html>
