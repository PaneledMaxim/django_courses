<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
        <a href="{% url 'schedule_index' %}">Преподаватели</a> |
        <a href="{% url 'courses' %}">Курсы</a> |
        <a href="{% url 'student_index' %}">Студенты</a> |
    </nav>
    <hr>

    <h1>Студенты</h1>
    <ul>
    {% for student in students %}
        <li>
            {{ student.first_name }} {{ student.last_name }} ({{ student.email }})
            <a href="{% url 'student_update' student.id %}">Редактировать</a>
            <a href="{% url 'student_delete' student.id %}">Удалить</a>
            <br>
            <a href="{% url 'student_courses' student.id %}">Курсы</a>
            <a href="{% url 'student_enroll' student.id %}">Записать на курс</a>
        </li>
    {% empty %}
        <li>Студенты не найдены</li>
    {% endfor %}
    </ul>

<a href="{% url 'student_create' %}">Добавить студента</a>
</body>
</html>
