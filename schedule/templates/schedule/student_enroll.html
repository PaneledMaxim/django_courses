<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на курс</title>
</head>
<body>
    <nav>
        <a href="{% url 'schedule_index' %}">Преподаватели</a> |
        <a href="{% url 'courses' %}">Курсы</a> |
        <a href="{% url 'student_index' %}">Студенты</a> |
    </nav>
    <hr>

    <h1>Записать студента на курс</h1>
    <p><strong>Студент:</strong> {{ student.first_name }} {{ student.last_name }}</p>

    <form method="post">
        {% csrf_token %}
        <label for="course_id">Выберите курс:</label>
        <select name="course_id">
            {% for course in courses %}
                <option value="{{ course.id }}">{{ course.title }}</option>
            {% endfor %}
        </select>
        <br><br>
        <button type="submit">Записать</button>
    </form>
    <br>
    <a href="{% url 'student_courses' student.id %}">К курсам студента</a>
    <br>
    <a href="{% url 'student_index' %}">К списку студентов</a>
</body>
</html>
